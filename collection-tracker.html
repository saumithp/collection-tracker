<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE7;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #9E9B96;
    --accent: #2D4A3E;
    --accent-light: #E1F5EE;
    --manga-bg: #EEF0FF;
    --manga-fg: #3D3BAA;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- LAYOUT ---- */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo { font-family: 'Fraunces', serif; font-size: 20px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { font-style: italic; }

  main { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ---- STATS ---- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; color: var(--text); line-height: 1; }

  /* ---- TOOLBAR ---- */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 200px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  input[type=text], input[type=search] {
    width: 100%; padding: 9px 12px 9px 36px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=search]:focus { border-color: var(--accent); }
  select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--surface);
    color: var(--text2); outline: none; cursor: pointer;
  }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
    background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ---- ADD BUTTON ---- */
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 18px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; }

  /* ---- GRID ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border2); }

  .card-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--surface2); }
  .card-cover-placeholder {
    width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: rgba(255,255,255,0.85);
  }
  .card-body { padding: 11px 13px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .card-type { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .type-manga { background: var(--manga-bg); color: var(--manga-fg); }
  .type-book { background: var(--book-bg); color: var(--book-fg); }
  .card-title { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; line-height: 1.3;
    color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: 12px; color: var(--text3); }
  .card-stars { display: flex; gap: 2px; font-size: 12px; }
  .card-footer {
    border-top: 1px solid var(--border); padding: 8px 13px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .card-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 4px 7px;
    font-size: 12px; border-radius: 6px; color: var(--text3); font-family: 'DM Sans', sans-serif;
    transition: background 0.12s, color 0.12s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }
  .btn-icon.del:hover { background: #FFEAEA; color: #C0392B; }

  /* ---- EMPTY ---- */
  .empty { text-align: center; padding: 80px 20px; border: 2px dashed var(--border); border-radius: var(--radius-lg); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { color: var(--text2); font-size: 14px; }

  /* ---- MODAL ---- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 16px;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: 18px;
    width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-family: 'Fraunces', serif; font-size: 18px; }
  .btn-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3); padding: 4px; border-radius: 6px; }
  .btn-close:hover { color: var(--text); background: var(--surface2); }
  .modal-body { padding: 20px 24px 24px; }

  /* ---- FORM ---- */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface);
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 72px; }

  .cover-upload-area {
    display: flex; gap: 16px; align-items: center; margin-bottom: 20px;
    padding: 14px; background: var(--surface2); border-radius: var(--radius); border: 1px dashed var(--border2);
  }
  .cover-preview { width: 70px; height: 98px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface); }
  .cover-placeholder-sm {
    width: 70px; height: 98px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; background: var(--surface); border: 1px solid var(--border);
  }
  .btn-upload {
    display: inline-block; padding: 7px 14px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; background: var(--surface); color: var(--text2);
    transition: all 0.12s;
  }
  .btn-upload:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove-cover { background: none; border: none; font-size: 12px; color: #C0392B; cursor: pointer; margin-left: 8px; font-family: 'DM Sans', sans-serif; }


  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }
  .btn-cancel {
    padding: 9px 18px; border: 1px solid var(--border2); border-radius: var(--radius);
    background: none; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: var(--text2);
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 9px 22px; background: var(--accent); color: white; border: none;
    border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.88; }

  
  .meta-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .meta-tag {
    font-size:10px;
    padding:3px 7px;
    border-radius:20px;
    background: var(--surface2);
    color: var(--text2);
    border:1px solid var(--border);
  }
  .series-card-stat {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--text2);
    margin-top:6px;
  }

  /* ---- SERIES RATING BADGE ---- */
  .rating-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
    margin-top: 6px; color: white;
    background: var(--accent); /* default blue-green */
  }
  .rating-badge .rb-star { font-size: 12px; }
  .rating-badge .rb-num { letter-spacing: 0.01em; }
  /* 1-4: muted grey-blue */
  .rating-badge.rb-low   { background: #6B7F9E; }
  /* 5-7: brand blue */
  .rating-badge.rb-mid   { background: #3D3BAA; }
  /* 8-9: brand green */
  .rating-badge.rb-high  { background: var(--accent); }
  /* 10: gold */
  .rating-badge.rb-perfect { background: #C07000; }

  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 20px;
    padding: 2px; transition: transform 0.1s; line-height: 1;
    color: #D0C8A0;
  }
  .star-btn:hover, .star-btn.active { color: #E8A000; transform: scale(1.15); }
  .star-btn.perfect { color: #E8A000; filter: drop-shadow(0 0 4px rgba(232,160,0,0.5)); }

  /* Rating stats table */
  .rating-stats-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
  }
  .rating-stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .rating-stat-badge-wrap { flex-shrink: 0; }
  .rating-stat-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .rating-stat-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rating-stat-sub  { font-size: 11px; color: var(--text3); }

  .rating-dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rating-dist-label { width: 42px; flex-shrink: 0; }
  .rating-dist-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .rating-dist-bar { height: 100%; border-radius: 99px; transition: width 0.4s; }
  .rating-dist-count { width: 24px; text-align: right; font-size: 12px; color: var(--text2); font-weight: 500; flex-shrink: 0; }


  /* ---- IMPORT/EXPORT MENU ---- */
  .ie-wrap { position: relative; }
  .btn-ie {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 14px; background: var(--surface); color: var(--text2);
    border: 1px solid var(--border2); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-ie:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .ie-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    min-width: 200px; z-index: 200; overflow: hidden;
    animation: slideUp 0.15s;
  }
  .ie-dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; font-size: 13px; cursor: pointer;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    transition: background 0.12s; border: none; background: none;
    width: 100%; text-align: left;
  }
  .ie-dropdown-item:hover { background: var(--surface2); }
  .ie-dropdown-item .ie-icon { font-size: 16px; width: 20px; text-align: center; }
  .ie-dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .ie-dropdown-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 16px 4px; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--text); color: white; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    z-index: 9999; opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


  /* ---- STATS PAGE ---- */
  .stats-page { display: flex; flex-direction: column; gap: 2rem; }
  .stats-section-title {
    font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500;
    color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
  }
  .stats-section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; flex-direction: column; gap: 4px;
  }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 32px; color: var(--text); line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .chart-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
  .chart-canvas-wrap { position: relative; }
  canvas.stat-canvas { display: block; width: 100%; }

  .bar-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .bar-row { display: flex; flex-direction: column; gap: 3px; }
  .bar-row-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
  .bar-row-label span:last-child { font-weight: 500; color: var(--text); }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .donut-wrap { display: flex; align-items: center; gap: 18px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-item span:last-child { margin-left: auto; font-weight: 500; color: var(--text); }

  /* ---- MISSING VOLUMES ---- */
  .missing-series-list { display: flex; flex-direction: column; gap: 10px; }
  .missing-series-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px;
  }
  .missing-series-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .missing-series-meta { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .missing-vols-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .vol-chip {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px;
    background: #FDDEDE; color: #A32D2D; border: 1px solid #F5C0C0;
  }
  .missing-none { font-size: 13px; color: #2D4A3E; font-weight: 500; }
  .missing-filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .missing-filter-row input {
    flex: 1; min-width: 160px; padding: 7px 11px; border: 1px solid var(--border);
    border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--surface); color: var(--text); outline: none;
  }
  .missing-filter-row input:focus { border-color: var(--accent); }
  .missing-filter-row select {
    padding: 7px 11px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--surface); color: var(--text);
  }

  /* ---- SERIES DETAIL MODAL ---- */
  .series-detail-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
  .series-detail-cover { width: 90px; height: 120px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: var(--surface2); }
  .series-detail-cover-placeholder { width: 90px; height: 120px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.85); }
  .series-detail-meta { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .series-detail-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; line-height: 1.2; }
  .series-detail-author { font-size: 13px; color: var(--text2); }
  .series-kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 18px; }
  .series-kpi { background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; }
  .series-kpi-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .series-kpi-value { font-family: 'Fraunces', serif; font-size: 22px; color: var(--text); line-height: 1; }
  .series-kpi-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .vol-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .vol-bubble { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; transition: transform 0.1s; border: 1.5px solid transparent; }
  .vol-bubble:hover { transform: scale(1.12); }
  .vol-bubble.owned { background: var(--accent-light); color: var(--accent); border-color: rgba(45,74,62,0.25); }
  .vol-bubble.missing { background: #FDDEDE; color: #A32D2D; border-color: #F5C0C0; }
  .vol-bubble.unknown { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 16px; }
  .vol-item-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; transition: background 0.12s; }
  .vol-item-row:hover { background: #e8e4dc; }
  .vol-item-cover { width: 32px; height: 44px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--surface); }
  .vol-item-cover-placeholder { width: 32px; height: 44px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.85); }
  .vol-item-info { flex: 1; min-width: 0; }
  .vol-item-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vol-item-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ---- AUTHOR MODAL ---- */

<script>
/* ---- INDEXEDDB COVER STORE ---- */
const CoverDB = (() => {
  const DB_NAME = "collection-covers";
  const STORE = "covers";
  let _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror = () => rej(req.error);
    });
  }

  async function get(id) {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).get(String(id));
      req.onsuccess = () => res(req.result || null);
      req.onerror = () => rej(req.error);
    });
  }

  async function set(id, dataUrl) {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(dataUrl, String(id));
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  }

  async function remove(id) {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(String(id));
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  }

  async function getAll() {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly");
      const store = tx.objectStore(STORE);
      const out = {};
      const keysReq = store.getAllKeys();
      keysReq.onsuccess = () => {
        const keys = keysReq.result;
        const valsReq = store.getAll();
        valsReq.onsuccess = () => {
          keys.forEach((k, i) => out[k] = valsReq.result[i]);
          res(out);
        };
        valsReq.onerror = () => rej(valsReq.error);
      };
      keysReq.onerror = () => rej(keysReq.error);
    });
  }

  async function setMany(map) {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      Object.entries(map).forEach(([k, v]) => store.put(v, String(k)));
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  }

  return { get, set, remove, getAll, setMany };
})();

// In-memory cover cache so renders are instant after first load
const coverCache = {};

async function loadAllCoversIntoCache() {
  const all = await CoverDB.getAll();
  Object.assign(coverCache, all);
  // Also migrate any covers still living in the items array (old format)
  let migrated = false;
  items.forEach(item => {
    if (item.cover && !coverCache[String(item.id)]) {
      coverCache[String(item.id)] = item.cover;
      CoverDB.set(item.id, item.cover);
      migrated = true;
    }
    delete item.cover; // always strip from item object
  });
  if (migrated) save();
}

function getCover(id) {
  return coverCache[String(id)] || null;
}

/* ---- END INDEXEDDB COVER STORE ---- */

const STATUS_COLORS = {
  "Reading":       { bg:"#D4F1E4", fg:"#0F6E56" },
  "Completed":     { bg:"#D6EAF8", fg:"#185FA5" },
  "On Hold":       { bg:"#FEF0CD", fg:"#BA7517" },
  "Plan to Read":  { bg:"#E8E8E8", fg:"#5F5E5A" },
  "Dropped":       { bg:"#FDDEDE", fg:"#A32D2D" },
};
const PALETTE = ["#2D4A3E","#3D3BAA","#8B4A00","#7B3553","#185FA5","#3B6D11","#BA7517","#A32D2D"];

let items = JSON.parse(localStorage.getItem("collection-v1") || "[]");
let typeFilter = "All";
let currentCover = null;      // base64 string or null
let coverWasRemoved = false;  // true when user clicked Remove on an existing cover
let currentView = 'library';

// Dirty flags — set true when data changes so tabs re-render only when needed
let seriesDirty = true;
let statsDirty  = true;
let yearDirty   = true;

// Cached series meta — updated on every save, avoids repeated localStorage reads
let _seriesMeta = JSON.parse(localStorage.getItem("series-meta") || "{}");
function getSeriesMetaCache() { return _seriesMeta; }
function refreshSeriesMeta() { _seriesMeta = JSON.parse(localStorage.getItem("series-meta") || "{}"); }

// IntersectionObserver for lazy cover loading
const _coverObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const el = entry.target;
    const id = el.dataset.coverid;
    if (!id) return;
    const src = getCover(id);
    if (src) {
      const img = document.createElement("img");
      img.className = el.className; // card-cover or recent-cover etc
      img.src = src;
      img.alt = el.dataset.alt || "";
      el.replaceWith(img);
    }
    _coverObserver.unobserve(el);
  });
}, { rootMargin: "200px" });
let bulkMode = false;
let selectedIds = new Set();
let recentHidden = false;

function save() {
  // Never write cover data to localStorage — covers live in IndexedDB
  const slim = items.map(i => { const c = {...i}; delete c.cover; delete c._titleLower; delete c._authorLower; delete c._dateBoughtMs; return c; });
  localStorage.setItem("collection-v1", JSON.stringify(slim));
  buildIndex();
}

// Call after any data mutation — marks background tabs dirty, re-renders active ones
function markDirty() {
  seriesDirty = true; statsDirty = true; yearDirty = true;
  renderRecent();
  if (currentView === "series") { renderSeries(); seriesDirty = false; }
  if (currentView === "stats")  { renderStats();  statsDirty  = false; }
  if (currentView === "year")   { renderYear();   yearDirty   = false; }
}


// Helper: get series meta for a given series name
function getSeriesMeta(seriesName) {
  if (!seriesName) return {};
  return _seriesMeta[seriesName] || {};
}

// Backfill all items: set author/demographic/genre/publisher from their series meta
function backfillItemsFromSeries() {
  const meta = _seriesMeta;
  let dirty = false;
  items = items.map(item => {
    if (!item.series) return item;
    const sm = meta[item.series] || {};
    const updates = {};
    if (sm.author && item.author !== sm.author) { updates.author = sm.author; dirty = true; }
    if (sm.demographic && item.demographic !== sm.demographic) { updates.demographic = sm.demographic; dirty = true; }
    if (sm.genre && item.genre !== sm.genre) { updates.genre = sm.genre; dirty = true; }
    if (sm.publisher && item.publisher !== sm.publisher) { updates.publisher = sm.publisher; dirty = true; }
    return Object.keys(updates).length ? { ...item, ...updates } : item;
  });
  if (dirty) save();
}
backfillItemsFromSeries();



function switchView(view) {
  currentView = view;
  document.getElementById("library-view").style.display = view === "library" ? "block" : "none";
  document.getElementById("series-view").style.display = view === "series" ? "block" : "none";
  document.getElementById("stats-view").style.display = view === "stats" ? "block" : "none";
  document.getElementById("year-view").style.display = view === "year" ? "block" : "none";
  document.getElementById("library-tab").classList.toggle("active", view === "library");
  document.getElementById("series-tab").classList.toggle("active", view === "series");
  document.getElementById("stats-tab").classList.toggle("active", view === "stats");
  document.getElementById("year-tab").classList.toggle("active", view === "year");
  if (view === "series" && seriesDirty) { renderSeries(); seriesDirty = false; }
  if (view === "stats"  && statsDirty)  { renderStats();  statsDirty  = false; }
  if (view === "year"   && yearDirty)   { renderYear();   yearDirty   = false; }
}

function toggleYear(year) {
  const wrap = document.getElementById(`year-wrap-${year}`);
  const btn = document.getElementById(`year-btn-${year}`);
  if (!wrap) return;
  const isOpen = wrap.style.maxHeight !== "0px" && wrap.style.maxHeight !== "";
  wrap.style.maxHeight = isOpen ? "0px" : wrap.scrollHeight + "px";
  if (btn) btn.textContent = isOpen ? "Show" : "Hide";
}

function renderYear() {
  const el = document.getElementById("year-content");

  // Group items by year of dateBought; fallback bucket for undated
  const yearMap = {};
  const undated = [];

  items.forEach(item => {
    if (item.dateBought) {
      const y = item.dateBought.slice(0, 4);
      if (!yearMap[y]) yearMap[y] = [];
      yearMap[y].push(item);
    } else {
      undated.push(item);
    }
  });

  const years = Object.keys(yearMap).sort((a, b) => b - a); // newest first

  if (years.length === 0 && undated.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>Add purchase dates to your items to see them organised by year.</p></div>`;
    return;
  }

  function cardHtml(item) {
    const sc = STATUS_COLORS[item.status] || { bg:"#eee", fg:"#555" };
    const initials = item.title.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
    const color = PALETTE[item.title.length % PALETTE.length];
    const lazyCover = lazyCoverHtml(item.id, item.title, "card-cover");
    return `<div class="card">
      <div class="card-cover-wrap">
        ${lazyCover || `<div class="card-cover-placeholder" style="background:${color}">${initials}</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-author">${esc(item.author || "Unknown author")}</div>
        ${item.series ? `<div class="meta-tags"><span class="meta-tag">${esc(item.series)}</span></div>` : ""}
        ${item.pricePaid != null ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">£${item.pricePaid.toFixed(2)}</div>` : ""}
      </div>
      <div class="card-footer">
        <span class="status-pill" style="background:${sc.bg};color:${sc.fg}">${item.status}</span>
        <div class="card-actions">
          <button class="btn-icon" onclick="openEdit(${item.id})">Edit</button>
          <button class="btn-icon del" onclick="deleteItem(${item.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }

  function yearSectionHtml(year, yearItems) {
    const spent = yearItems.reduce((s, i) => s + (i.pricePaid || 0), 0);
    const vols = yearItems.reduce((s, i) => s + (parseInt(i.volumes) || 1), 0);
    // Sort by dateBought within year, then title
    const sorted = [...yearItems].sort((a, b) => {
      if (a.dateBought && b.dateBought) return a.dateBought.localeCompare(b.dateBought);
      return a.title.localeCompare(b.title, undefined, {numeric: true, sensitivity: 'base'});
    });
    return `<div class="year-section">
      <div class="year-header" onclick="toggleYear('${year}')">
        <div class="year-label">${year}</div>
        <div class="year-pills">
          <span class="year-pill accent">${yearItems.length} item${yearItems.length !== 1 ? "s" : ""}</span>
          <span class="year-pill">${vols} vol${vols !== 1 ? "s" : ""}</span>
          ${spent > 0 ? `<span class="year-pill">£${spent.toFixed(2)}</span>` : ""}
        </div>
        <div class="year-divider"></div>
        <button class="year-toggle" id="year-btn-${year}" onclick="event.stopPropagation();toggleYear('${year}')">Hide</button>
      </div>
      <div class="year-grid-wrap" id="year-wrap-${year}" style="max-height:9999px">
        <div class="grid">${sorted.map(cardHtml).join("")}</div>
      </div>
    </div>`;
  }

  let html = years.map(y => yearSectionHtml(y, yearMap[y])).join("");

  if (undated.length > 0) {
    const sorted = [...undated].sort((a, b) => a.title.localeCompare(b.title, undefined, {numeric: true, sensitivity: 'base'}));
    html += `<div class="year-no-date">
      <div class="year-no-date-title">No purchase date — ${undated.length} item${undated.length !== 1 ? "s" : ""}</div>
      <div class="grid">${sorted.map(cardHtml).join("")}</div>
    </div>`;
  }

  el.innerHTML = html;
  observeCovers(el);
}

function renderSeries() {
  const grid = document.getElementById("series-grid");

  const seriesMap = {};
  items.forEach(item => {
    const name = item.series || "Standalone";
    if (!seriesMap[name]) {
      seriesMap[name] = {
        name,
        type: item.type,
        coverItemId: getCover(item.id) ? item.id : null,
        owned: 0,
        total: "",
        author: "",
        demographic: "",
        genre: "",
        publisher: "",
        mangaStatus: "Publishing",
        collectionStatus: "Collecting"
      };
    } else if (!seriesMap[name].coverItemId && getCover(item.id)) {
      seriesMap[name].coverItemId = item.id;
    }
    seriesMap[name].owned++;
  });

  const savedSeries = _seriesMeta;

  Object.values(seriesMap).forEach(series => {
    if (savedSeries[series.name]) {
      Object.assign(series, savedSeries[series.name]);
    }
  });

  const sortVal = document.getElementById("series-sort") ? document.getElementById("series-sort").value : "name";
  let seriesList = Object.values(seriesMap);

  seriesList.forEach(s => {
    const total = parseInt(s.total);
    s.pct = (!isNaN(total) && total > 0) ? Math.min(100, Math.round((s.owned / total) * 100)) : null;
  });

  if (sortVal === "owned") seriesList.sort((a, b) => b.owned - a.owned);
  else if (sortVal === "pct") seriesList.sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1));
  else if (sortVal === "pct-asc") seriesList.sort((a, b) => (a.pct ?? 101) - (b.pct ?? 101));
  else seriesList.sort((a, b) => a.name.localeCompare(b.name));

  grid.innerHTML = seriesList.map(series => {
    const hasPct = series.pct !== null;
    const pct = series.pct ?? 0;
    const pctColor = pct >= 100 ? "#2D4A3E" : pct >= 50 ? "#3D3BAA" : "#BA7517";
    const lazyCover = series.coverItemId ? lazyCoverHtml(series.coverItemId, series.name, "card-cover") : null;
    const safeName = series.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `
    <div class="card" onclick="openSeriesDetail('${safeName}')" style="cursor:pointer">
      ${lazyCover || `<div class="card-cover-placeholder" style="background:#2D4A3E">${esc(series.name.slice(0,2).toUpperCase())}</div>`}
      <div class="card-body">
        <div class="card-title">${esc(series.name)}</div>
        ${series.author ? `<div class="card-author" style="margin-top:2px">${esc(series.author)}</div>` : ""}
        <div class="meta-tags" style="margin-top:5px">
          ${series.demographic ? `<span class="meta-tag">${esc(series.demographic)}</span>` : ""}
          ${series.genre ? `<span class="meta-tag">${esc(series.genre)}</span>` : ""}
          ${series.publisher ? `<span class="meta-tag" style="background:var(--accent-light);color:var(--accent);border-color:rgba(45,74,62,0.2)">${esc(series.publisher)}</span>` : ""}
        </div>
        <div class="series-card-stat"><span>Volumes owned</span><span>${series.owned}${series.total ? " / " + series.total : ""}</span></div>
        ${hasPct ? `
        <div style="margin-top:6px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:11px;color:var(--text3)">Collection</span>
            <span style="font-size:12px;font-weight:500;color:${pctColor}">${pct}%</span>
          </div>
          <div style="height:5px;background:var(--surface2);border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:99px;transition:width 0.4s"></div>
          </div>
        </div>` : ""}
        <div class="series-card-stat"><span>Manga status</span><span>${esc(series.mangaStatus)}</span></div>
        <div class="series-card-stat"><span>Collection status</span><span>${esc(series.collectionStatus)}</span></div>
        ${series.rating ? (() => {
          const r = parseInt(series.rating);
          const cls = r === 10 ? "rb-perfect" : r >= 8 ? "rb-high" : r >= 5 ? "rb-mid" : "rb-low";
          return `<div class="rating-badge ${cls}"><span class="rb-star">★</span><span class="rb-num">${r}/10</span></div>`;
        })() : ""}
      </div>
      <div class="card-footer" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openSeriesDetail('${safeName}')">View</button>
        <button class="btn-icon" onclick="editSeries('${safeName}')">Edit</button>
      </div>
    </div>`;
  }).join("");
  observeCovers(grid);
}

function renderStarButtons(active) {
  const wrap = document.getElementById("series-rating-stars");
  if (!wrap) return;
  wrap.innerHTML = "";
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "star-btn" + (i <= active ? (active === 10 ? " perfect" : " active") : "");
    btn.textContent = "★";
    btn.title = `${i}/10`;
    btn.addEventListener("click", () => {
      // Toggle off if clicking the same star
      const current = parseInt(document.getElementById("series-rating").value) || 0;
      const newVal = current === i ? 0 : i;
      document.getElementById("series-rating").value = newVal;
      renderStarButtons(newVal);
    });
    btn.addEventListener("mouseover", () => renderStarButtons(i));
    btn.addEventListener("mouseout", () => renderStarButtons(parseInt(document.getElementById("series-rating").value) || 0));
    wrap.appendChild(btn);
  }
  // Label
  const label = document.createElement("span");
  label.style.cssText = "font-size:12px;color:var(--text3);margin-left:6px";
  label.textContent = active ? `${active}/10` : "Not rated";
  wrap.appendChild(label);
}

/* ---- SEARCH OPTIMISATION ---- */
// Pre-compute lowercase fields and parsed dates used on every render
function buildIndex() {
  items.forEach(i => {
    i._titleLower  = (i.title  || "").toLowerCase();
    i._authorLower = (i.author || "").toLowerCase();
    i._dateBoughtMs = i.dateBought ? new Date(i.dateBought).getTime() : null;
  });
}
buildIndex();

let _renderTimer = null;
function debouncedRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(render, 150);
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("status-filter").value;
  const sort = document.getElementById("sort-select").value;

  let list = items
    .filter(i => typeFilter === "All" || i.type === typeFilter)
    .filter(i => status === "All" || i.status === status)
    .filter(i => !search || i._titleLower.includes(search) || i._authorLower.includes(search));

  if (sort === "title") list.sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric: true, sensitivity: 'base'}));
  else if (sort === "title-desc") list.sort((a,b) => b.title.localeCompare(a.title, undefined, {numeric: true, sensitivity: 'base'}));
  else if (sort === "price-asc") list.sort((a,b) => (a.pricePaid ?? Infinity) - (b.pricePaid ?? Infinity));
  else if (sort === "price-desc") list.sort((a,b) => (b.pricePaid ?? -Infinity) - (a.pricePaid ?? -Infinity));
  else {
    list.sort((a,b) => {
      const da = a._dateBoughtMs, db = b._dateBoughtMs;
      if (da === null && db === null) return b.addedAt - a.addedAt;
      if (da === null) return 1;
      if (db === null) return -1;
      return db - da;
    });
  }

  document.getElementById("s-total").textContent = items.length;
  const uniqueSeries = new Set(items.map(i => i.series).filter(Boolean));
  document.getElementById("s-manga").textContent = uniqueSeries.size;
  document.getElementById("s-books").textContent = items.filter(i=>i.status==="Reading").length;
  document.getElementById("s-done").textContent = items.filter(i=>i.status==="Completed").length;

  // Recently Added — only re-render when items change (called from markDirty)
  // renderRecent() is NOT called here to avoid cover cost on every filter/search change

  const grid = document.getElementById("grid");
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">📚</div>
      <p>${items.length===0 ? "Add your first title to get started" : "No titles match your filters"}</p>
    </div>`;
    return;
  }

  const gridEl = document.getElementById("grid");
  gridEl.className = "grid" + (bulkMode ? " bulk-mode" : "");

  grid.innerHTML = list.map(item => {
    const sc = STATUS_COLORS[item.status] || { bg:"#eee", fg:"#555" };
    const initials = item.title.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
    const color = PALETTE[item.title.length % PALETTE.length];
    const lazyHtml = lazyCoverHtml(item.id, item.title, "card-cover");
    const coverHtml = lazyHtml || `<div class="card-cover-placeholder" style="background:${color}">${initials}</div>`;
    const isSelected = selectedIds.has(item.id);
    const cardClick = bulkMode ? `toggleSelectCard(${item.id}, this)` : "";
    return `<div class="card${isSelected ? " selected" : ""}" ${bulkMode ? `onclick="toggleSelectCard(${item.id}, this)" style="cursor:pointer"` : ""}>
      <div class="card-cover-wrap" style="position:relative">
        ${coverHtml}
        <div class="card-select-checkbox" onclick="event.stopPropagation();toggleSelectCard(${item.id}, this.closest('.card'))">${isSelected ? "✓" : ""}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-author">${esc(item.author||"Unknown author")}</div>
        <div class="meta-tags">
          ${item.series ? `<span class="meta-tag">${esc(item.series)}</span>` : ""}
          ${item.demographic ? `<span class="meta-tag">${esc(item.demographic)}</span>` : ""}
          ${item.genre ? `<span class="meta-tag">${esc(item.genre)}</span>` : ""}
          ${item.publisher ? `<span class="meta-tag" style="background:var(--accent-light);color:var(--accent);border-color:rgba(45,74,62,0.2)">${esc(item.publisher)}</span>` : ""}
        </div>
        ${item.volumes ? `<div style="font-size:11px;color:var(--text3)">${esc(item.volumes)} vol.</div>` : ""}
        ${item.pricePaid != null ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">£${item.pricePaid.toFixed(2)}${item.dateBought ? ` · ${item.dateBought}` : ""}</div>` : (item.dateBought ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${item.dateBought}</div>` : "")}
      </div>
      <div class="card-footer">
        <span class="status-pill" style="background:${sc.bg};color:${sc.fg}">${item.status}</span>
        <div class="card-actions">
          ${!bulkMode ? `<button class="btn-icon" onclick="openEdit(${item.id})">Edit</button>
          <button class="btn-icon del" onclick="deleteItem(${item.id})">Delete</button>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");
  observeCovers(grid);
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// Returns img tag if cover already visible in DOM, otherwise a lazy placeholder div
function lazyCoverHtml(itemId, title, cssClass) {
  const src = getCover(itemId);
  if (!src) return null; // no cover — caller should render placeholder
  // Always lazy: placeholder div observed by IntersectionObserver
  const initials = title.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
  const color = PALETTE[title.length % PALETTE.length];
  return `<div class="${cssClass} cover-lazy-placeholder" data-coverid="${itemId}" data-alt="${esc(title)}" style="background:${color};display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:rgba(255,255,255,0.85)">${initials}</div>`;
}

// Call after any innerHTML update that may contain lazy placeholders
function observeCovers(root) {
  (root || document).querySelectorAll(".cover-lazy-placeholder").forEach(el => {
    _coverObserver.observe(el);
  });
}

function setType(btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  typeFilter = btn.dataset.type;
  render();
}

/* ---- RECENTLY ADDED ---- */
function renderRecent() {
  const rs = document.getElementById("recent-section");
  if (!rs) return;
  if (recentHidden || items.length === 0 || !items.some(i => i.dateBought)) { rs.style.display = "none"; return; }
  rs.style.display = "";
  const recent = [...items]
    .filter(i => i.dateBought)
    .sort((a,b) => new Date(b.dateBought) - new Date(a.dateBought))
    .slice(0, 8);
  const grid = document.getElementById("recent-grid");
  grid.innerHTML = recent.map(item => {
    const lazyCover = lazyCoverHtml(item.id, item.title, "recent-cover");
    const initials = item.title.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
    const color = PALETTE[item.title.length % PALETTE.length];
    const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
    const boughtMidnight = new Date(item.dateBought); boughtMidnight.setHours(0,0,0,0);
    const daysAgo = Math.round((todayMidnight - boughtMidnight) / 86400000);
    const dateStr = daysAgo === 0 ? "Today" : daysAgo === 1 ? "Yesterday" : `${daysAgo}d ago`;
    return `<div class="recent-card" onclick="openEdit(${item.id})">
      ${lazyCover || `<div class="recent-cover-placeholder" style="background:${color}">${initials}</div>`}
      <div class="recent-info">
        <div class="recent-name">${esc(item.title)}</div>
        <div class="recent-date">${dateStr}</div>
      </div>
    </div>`;
  }).join("");
  observeCovers(grid);
}

function toggleRecentSection() {
  recentHidden = !recentHidden;
  renderRecent();
  const bar = document.getElementById("recent-unhide-bar");
  if (bar) bar.style.display = recentHidden ? "block" : "none";
}

/* ---- BULK EDIT ---- */
function toggleBulkMode() {
  bulkMode = !bulkMode;
  selectedIds.clear();
  const btn = document.getElementById("bulk-toggle-btn");
  const bar = document.getElementById("bulk-bar");
  if (bulkMode) {
    btn.style.background = "var(--accent)"; btn.style.color = "white"; btn.style.borderColor = "var(--accent)";
    bar.style.display = "flex";
  } else {
    btn.style.background = ""; btn.style.color = ""; btn.style.borderColor = "";
    bar.style.display = "none";
    document.getElementById("bulk-status-select").value = "";
    document.getElementById("bulk-series-input").value = "";
  }
  updateBulkCount();
  render();
}

function toggleSelectCard(id, cardEl) {
  if (!bulkMode) return;
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    cardEl.classList.remove("selected");
    const cb = cardEl.querySelector(".card-select-checkbox");
    if (cb) cb.textContent = "";
  } else {
    selectedIds.add(id);
    cardEl.classList.add("selected");
    const cb = cardEl.querySelector(".card-select-checkbox");
    if (cb) cb.textContent = "✓";
  }
  updateBulkCount();
}

function updateBulkCount() {
  const el = document.getElementById("bulk-count-label");
  if (el) el.textContent = `${selectedIds.size} selected`;
}

function bulkSelectAll() {
  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("status-filter").value;
  const filtered = items
    .filter(i => typeFilter === "All" || i.type === typeFilter)
    .filter(i => status === "All" || i.status === status)
    .filter(i => !search || i.title.toLowerCase().includes(search) || (i.author||"").toLowerCase().includes(search));
  const allShownSelected = filtered.every(i => selectedIds.has(i.id));
  if (allShownSelected) {
    filtered.forEach(i => selectedIds.delete(i.id));
  } else {
    filtered.forEach(i => selectedIds.add(i.id));
  }
  updateBulkCount();
  render();
}

function bulkApply() {
  if (selectedIds.size === 0) { showToast("⚠️ No items selected"); return; }
  const newStatus = document.getElementById("bulk-status-select").value;
  const newSeries = document.getElementById("bulk-series-input").value.trim();
  if (!newStatus && !newSeries) { showToast("⚠️ Choose a status or series to apply"); return; }
  let count = 0;
  items = items.map(i => {
    if (!selectedIds.has(i.id)) return i;
    const updates = {};
    if (newStatus) updates.status = newStatus;
    if (newSeries !== "") updates.series = newSeries;
    count++;
    return { ...i, ...updates };
  });
  save(); selectedIds.clear(); updateBulkCount();
  document.getElementById("bulk-status-select").value = "";
  document.getElementById("bulk-series-input").value = "";
  render(); renderSeries();
  showToast(`✅ Updated ${count} item${count !== 1 ? "s" : ""}`);
}

function bulkDelete() {
  if (selectedIds.size === 0) { showToast("⚠️ No items selected"); return; }
  if (!confirm(`Delete ${selectedIds.size} item${selectedIds.size !== 1 ? "s" : ""}? This cannot be undone.`)) return;
  const toDelete = [...selectedIds];
  items = items.filter(i => !selectedIds.has(i.id));
  toDelete.forEach(id => { delete coverCache[String(id)]; CoverDB.remove(id); });
  selectedIds.clear(); updateBulkCount();
  save(); render(); renderSeries();
  showToast(`🗑 Deleted ${toDelete.length} item${toDelete.length !== 1 ? "s" : ""}`);
}

function saveItem() {
  const title = document.getElementById("f-title").value.trim();
  if (!title) { document.getElementById("f-title").focus(); return; }
  const editId = parseFloat(document.getElementById("edit-id").value);
  const seriesName = document.getElementById("f-series").value.trim();
  const sm = getSeriesMeta(seriesName);
  const obj = {
    title,
    author: sm.author || "",
    type: "Manga",
    status: document.getElementById("f-status").value,
    volumes: document.getElementById("f-volumes").value.trim(),
    volRange: document.getElementById("f-volrange").value.trim() || null,
    series: seriesName,
    demographic: sm.demographic || "",
    genre: sm.genre || "",
    publisher: sm.publisher || "",
    notes: document.getElementById("f-notes").value.trim(),
    dateBought: document.getElementById("f-dateBought").value || null,
    pricePaid: document.getElementById("f-pricePaid").value !== "" ? parseFloat(document.getElementById("f-pricePaid").value) : null,
    msrp: document.getElementById("f-msrp").value !== "" ? parseFloat(document.getElementById("f-msrp").value) : null,
  };
  let savedId;
  if (editId) {
    const idx = items.findIndex(i => i.id === editId);
    if (idx > -1) { items[idx] = { ...items[idx], ...obj }; savedId = editId; }
  } else {
    savedId = Date.now();
    items.unshift({ ...obj, id: savedId, addedAt: savedId });
  }
  // Save cover to IndexedDB
  if (currentCover) {
    coverCache[String(savedId)] = currentCover;
    CoverDB.set(savedId, currentCover);
  } else if (coverWasRemoved) {
    delete coverCache[String(savedId)];
    CoverDB.remove(savedId);
  }
  save(); render(); markDirty(); closeModal();
}

function deleteItem(id) {

  items = items.filter(i => i.id !== id);
  delete coverCache[String(id)];
  CoverDB.remove(id);
  save(); render(); markDirty();
}

/* ---- VOLUME RANGE PARSER ----
   Parses strings like "1-5, 7, 9-11" into a Set of numbers.
   A bare number like "12" is treated as "I own volumes 1–12" (sequential run).
   Returns { owned: Set<number>, isSequential: boolean }
*/
function parseVolumeString(str) {
  if (!str || !str.trim()) return { owned: new Set(), isSequential: false };
  const s = str.trim();
  // If it's just a plain integer with no commas/dashes (or trailing punctuation), treat as count 1–N
  if (/^\d+$/.test(s)) {
    const n = parseInt(s);
    const owned = new Set();
    for (let i = 1; i <= n; i++) owned.add(i);
    return { owned, isSequential: true };
  }
  // Otherwise parse as range list: "1-5, 7, 9-11"
  const owned = new Set();
  const parts = s.split(/[\s,]+/);
  parts.forEach(p => {
    const range = p.match(/^(\d+)-(\d+)$/);
    if (range) {
      const lo = parseInt(range[1]), hi = parseInt(range[2]);
      for (let i = lo; i <= Math.min(hi, lo + 500); i++) owned.add(i);
    } else if (/^\d+$/.test(p)) {
      owned.add(parseInt(p));
    }
  });
  return { owned, isSequential: false };
}

/* Compress a sorted array of integers into range strings, e.g. [1,2,3,5,7,8] → "1-3, 5, 7-8" */
function compressToRanges(nums) {
  if (!nums.length) return "";
  const sorted = [...nums].sort((a,b)=>a-b);
  const ranges = [];
  let start = sorted[0], end = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === end + 1) { end = sorted[i]; }
    else { ranges.push(start === end ? String(start) : `${start}–${end}`); start = end = sorted[i]; }
  }
  ranges.push(start === end ? String(start) : `${start}–${end}`);
  return ranges.join(", ");
}

function renderStats() {
  const el = document.getElementById("stats-content");

  const meta = _seriesMeta;

  // ---- Aggregates ----
  const total = items.length;
  const completed = items.filter(i => i.status === "Completed").length;
  const reading = items.filter(i => i.status === "Reading").length;
  const onHold = items.filter(i => i.status === "On Hold").length;
  const planTo = items.filter(i => i.status === "Plan to Read").length;
  const dropped = items.filter(i => i.status === "Dropped").length;

  // Spending
  const totalSpent = items.reduce((s, i) => s + (i.pricePaid != null ? i.pricePaid : 0), 0);
  const totalMsrp = items.reduce((s, i) => s + (i.msrp != null ? i.msrp : 0), 0);
  const totalSaved = totalMsrp - totalSpent;
  const itemsWithPrice = items.filter(i => i.pricePaid != null);
  const avgPricePerVol = itemsWithPrice.length ? totalSpent / itemsWithPrice.length : null;

  // Monthly/yearly spending
  const monthlySpend = {};
  const yearlySpend = {};
  items.forEach(i => {
    if (!i.dateBought || i.pricePaid == null) return;
    const d = new Date(i.dateBought);
    if (isNaN(d)) return;
    const yr = d.getFullYear();
    const mo = `${yr}-${String(d.getMonth()+1).padStart(2,"0")}`;
    monthlySpend[mo] = (monthlySpend[mo] || 0) + i.pricePaid;
    yearlySpend[yr] = (yearlySpend[yr] || 0) + i.pricePaid;
  });

  // Volumes owned total
  const totalVols = items.reduce((s, i) => s + (parseInt(i.volumes) || 1), 0);

  // Series map
  const seriesMap = {};
  items.forEach(item => {
    const name = item.series || "Standalone";
    if (!seriesMap[name]) seriesMap[name] = { name, owned: 0, total: null, author: "", publisher: "", demographic: "", genre: "" };
    seriesMap[name].owned++;
    const sm = meta[name] || {};
    if (sm.total) seriesMap[name].total = parseInt(sm.total) || null;
    if (sm.publisher) seriesMap[name].publisher = sm.publisher;
    if (sm.demographic) seriesMap[name].demographic = sm.demographic;
    if (sm.genre) seriesMap[name].genre = sm.genre;
    if (sm.author) seriesMap[name].author = sm.author;
  });
  const seriesList = Object.values(seriesMap).sort((a, b) => b.owned - a.owned);
  const numSeries = seriesList.length;

  // Publisher breakdown
  const publisherMap = {};
  items.forEach(i => {
    const p = i.publisher || "Unknown";
    publisherMap[p] = (publisherMap[p] || 0) + 1;
  });

  // Genre breakdown
  const genreMap = {};
  items.forEach(i => {
    if (i.genre) genreMap[i.genre] = (genreMap[i.genre] || 0) + 1;
  });

  // Demographic breakdown
  const demoMap = {};
  items.forEach(i => {
    if (i.demographic) demoMap[i.demographic] = (demoMap[i.demographic] || 0) + 1;
  });

  // Author breakdown
  const authorMap = {};
  items.forEach(i => {
    const a = i.author || "Unknown";
    if (!authorMap[a]) authorMap[a] = { count: 0, spent: 0, series: new Set() };
    authorMap[a].count++;
    authorMap[a].spent += i.pricePaid || 0;
    if (i.series) authorMap[a].series.add(i.series);
  });

  // Extract owned volume numbers for an item.
  // Priority: explicit volRange field > range in title (e.g. "Vol. 1-2") > single vol from title
  function extractOwnedNums(item) {
    const result = new Set();
    const src = item.volRange || "";
    if (src) {
      // Parse range string: "1-3", "4-6", "1", "1-2, 4-5" etc.
      src.split(/[\s,]+/).forEach(part => {
        const range = part.match(/^(\d+)[-–](\d+)$/);
        if (range) {
          const lo = parseInt(range[1]), hi = parseInt(range[2]);
          for (let v = lo; v <= Math.min(hi, lo + 200); v++) result.add(v);
        } else if (/^\d+$/.test(part)) {
          result.add(parseInt(part));
        }
      });
      if (result.size > 0) return result;
    }
    // Fall back: check title for a range first e.g. "Maid-sama! Vol. 1-2"
    const t = item.title || "";
    const rangeMatch = t.match(/(?:vol(?:ume)?\.?\s*|#)(\d+)[-–](\d+)/i);
    if (rangeMatch) {
      const lo = parseInt(rangeMatch[1]), hi = parseInt(rangeMatch[2]);
      for (let v = lo; v <= Math.min(hi, lo + 200); v++) result.add(v);
      return result;
    }
    // Fall back: single volume number from title
    const single = t.match(/(?:vol(?:ume)?\.?\s*|#|no\.?\s*)(\d+)/i) || t.match(/\b(\d+)\s*$/);
    if (single) result.add(parseInt(single[1]));
    return result;
  }

  const missingData = [];
  const missingSeriesMap = {};
  items.forEach(item => {
    if (!item.series) return;
    const key = item.series;
    if (!missingSeriesMap[key]) missingSeriesMap[key] = { name: key, author: item.author || "", ownedNums: new Set(), seriesTotal: null };
    extractOwnedNums(item).forEach(n => missingSeriesMap[key].ownedNums.add(n));
  });
  // Pull series totals and collection status from meta
  Object.values(missingSeriesMap).forEach(sg => {
    const sm = meta[sg.name] || {};
    if (sm.total) sg.seriesTotal = parseInt(sm.total) || null;
    sg.collectionComplete = sm.collectionStatus === "Completed";
  });
  Object.values(missingSeriesMap).forEach(sg => {
    const { ownedNums, seriesTotal } = sg;
    // If marked complete in series meta, show as complete with no gap analysis
    if (sg.collectionComplete) {
      missingData.push({ name: sg.name, author: sg.author, owned: ownedNums, total: seriesTotal, missing: [], forceComplete: true });
      return;
    }
    // Need either a series total set, or at least 2 items with vol numbers to infer a range
    if (!seriesTotal && ownedNums.size < 2) return;
    const maxOwned = ownedNums.size ? Math.max(...ownedNums) : 0;
    const expectedMax = seriesTotal || maxOwned;
    if (expectedMax < 1) return;
    const missing = [];
    for (let v = 1; v <= expectedMax; v++) {
      if (!ownedNums.has(v)) missing.push(v);
    }
    missingData.push({
      name: sg.name,
      author: sg.author,
      owned: ownedNums,
      total: seriesTotal,
      missing,
    });
  });
  missingData.sort((a,b) => a.name.localeCompare(b.name));

  // ---- Most / least complete series (need total set) ----
  const seriesWithPct = seriesList
    .filter(s => s.total && s.total > 0)
    .map(s => ({ ...s, pct: Math.min(100, s.owned / s.total * 100) }))
    .sort((a, b) => b.pct - a.pct);
  const mostComplete   = seriesWithPct.filter(s => s.pct < 100)[0] || seriesWithPct[0] || null;
  const leastComplete  = seriesWithPct.length > 1 ? seriesWithPct[seriesWithPct.length - 1] : null;

  // ---- Acquisition pace ----
  // Group purchases by month, compute 3-month rolling avg of last 3 full months
  const purchasesByMonth = {};
  items.forEach(i => {
    if (!i.dateBought) return;
    const d = new Date(i.dateBought);
    if (isNaN(d)) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    purchasesByMonth[key] = (purchasesByMonth[key] || 0) + 1;
  });
  const sortedMonths = Object.keys(purchasesByMonth).sort();
  // Drop the current partial month from the rolling avg
  const today = new Date();
  const thisMonth = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
  const fullMonths = sortedMonths.filter(m => m !== thisMonth);
  const last3 = fullMonths.slice(-3);
  const avgPerMonth = last3.length
    ? (last3.reduce((s, m) => s + purchasesByMonth[m], 0) / last3.length)
    : (sortedMonths.length ? Object.values(purchasesByMonth).reduce((a,b)=>a+b,0) / sortedMonths.length : null);
  const totalMonthsActive = fullMonths.length || sortedMonths.length;

  // ---- Most recent purchase & collection age ----
  const datedItems = items.filter(i => i.dateBought).sort((a, b) => b.dateBought.localeCompare(a.dateBought));
  const mostRecentItem = datedItems[0] || null;
  const oldestItem     = datedItems[datedItems.length - 1] || null;
  function daysAgoStr(dateStr) {
    if (!dateStr) return null;
    const diff = Math.round((Date.now() - new Date(dateStr)) / 86400000);
    if (diff === 0) return "Today";
    if (diff === 1) return "Yesterday";
    if (diff < 30)  return `${diff} days ago`;
    if (diff < 365) return `${Math.round(diff/30)} month${Math.round(diff/30)!==1?"s":""} ago`;
    const yrs = Math.floor(diff/365), mos = Math.round((diff%365)/30);
    return `${yrs}y${mos>0?" "+mos+"m":""} ago`;
  }
  function collectionAgeStr(dateStr) {
    if (!dateStr) return null;
    const diff = Math.round((Date.now() - new Date(dateStr)) / 86400000);
    const yrs = Math.floor(diff/365), mos = Math.round((diff%365)/30);
    if (yrs >= 1) return `${yrs} year${yrs!==1?"s":""}${mos>0?", "+mos+" mo":""}`;
    if (mos >= 1) return `${mos} month${mos!==1?"s":""}`;
    return `${diff} day${diff!==1?"s":""}`;
  }

  // ---- Price per volume by publisher ----
  const pubPriceMap = {};
  items.forEach(i => {
    if (i.pricePaid == null) return;
    const p = i.publisher || "Unknown";
    if (!pubPriceMap[p]) pubPriceMap[p] = { total: 0, count: 0 };
    pubPriceMap[p].total += i.pricePaid;
    pubPriceMap[p].count++;
  });
  const pubAvgEntries = Object.entries(pubPriceMap)
    .filter(([, v]) => v.count >= 2)
    .map(([k, v]) => [k, v.total / v.count, v.count])
    .sort((a, b) => b[1] - a[1]);

  // Status distribution
  const statusDist = {
    "Completed": completed, "Reading": reading,
    "On Hold": onHold, "Plan to Read": planTo, "Dropped": dropped
  };

  const COLORS = ["#2D4A3E","#3D3BAA","#8B4A00","#7B3553","#185FA5","#3B6D11","#BA7517","#A32D2D","#5B7B6F","#6B4CAA"];
  const STATUS_C = { "Completed":"#185FA5","Reading":"#0F6E56","On Hold":"#BA7517","Plan to Read":"#5F5E5A","Dropped":"#A32D2D" };

  function barListHTML(map, colorArr, maxCount) {
    const entries = Object.entries(map).sort((a,b) => b[1]-a[1]);
    const max = maxCount || Math.max(...entries.map(e=>e[1]), 1);
    return `<div class="bar-list">${entries.map(([k,v], idx) => `
      <div class="bar-row">
        <div class="bar-row-label"><span>${esc(k)}</span><span>${v}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${colorArr[idx % colorArr.length]}"></div></div>
      </div>`).join("")}</div>`;
  }

  function donutHTML(map, colorArr, canvasId, size=120) {
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const tot = entries.reduce((s,[,v])=>s+v,0)||1;
    const legend = entries.map(([k,v], i) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${colorArr[i%colorArr.length]}"></div>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(k)}</span>
        <span>${Math.round(v/tot*100)}%</span>
      </div>`).join("");
    return `<div class="donut-wrap">
      <canvas id="${canvasId}" width="${size}" height="${size}" class="stat-canvas" style="width:${size}px;height:${size}px;flex-shrink:0"></canvas>
      <div class="donut-legend">${legend}</div>
    </div>`;
  }

  function drawDonut(id, map, colorArr) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const tot = entries.reduce((s,[,v])=>s+v,0)||1;
    const cx = canvas.width/2, cy = canvas.height/2, r = cx*0.82, inner = r*0.58;
    let angle = -Math.PI/2;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    entries.forEach(([,v],i) => {
      const sweep = (v/tot)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,angle,angle+sweep);
      ctx.closePath(); ctx.fillStyle = colorArr[i%colorArr.length]; ctx.fill();
      angle += sweep;
    });
    ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
    ctx.fillStyle = "var(--surface, #fff)"; ctx.fill();
  }

  // Series volumes bar (top 10)
  const top10Series = seriesList.slice(0,10);
  const seriesBarHTML = `<div class="bar-list">${top10Series.map((s,i) => {

    return `<div class="bar-row">
      <div class="bar-row-label">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${esc(s.name)}</span>
        <span>${s.owned}${s.total ? " / "+s.total+(pct!==null?" ("+pct+"%)":"") : ""}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.owned/max*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
    </div>`;
  }).join("")}</div>`;

  // Completion progress bars per series (only those with total set)
  const withTotal = seriesList.filter(s => s.total && s.total > 0);
  const completionBarsHTML = withTotal.length ? `<div class="bar-list">${withTotal.sort((a,b) => (b.owned/b.total)-(a.owned/a.total)).map((s,i) => {

    return `<div class="bar-row">
      <div class="bar-row-label">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${esc(s.name)}</span>
        <span style="color:${col}">${pct}%</span>
      </div>

  el.innerHTML = `<div class="stats-page">

      <div class="stats-section-title">Overview</div>
      <div class="kpi-grid">
