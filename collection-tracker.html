/* ---- SERIES DETAIL MODAL ---- */
function openSeriesDetail(name) {
  const meta = _seriesMeta;
  const sm = meta[name] || {};
  const seriesItems = items.filter(i => (i.series || "Standalone") === name)
    .sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric:true, sensitivity:'base'}));

  const totalOwned = seriesItems.length;
  const totalVols = parseInt(sm.total) || null;
  const totalSpent = seriesItems.reduce((s,i) => s + (i.pricePaid || 0), 0);
  const priced = seriesItems.filter(i => i.pricePaid != null);
  const avgPrice = priced.length ? totalSpent / priced.length : null;
  const pct = totalVols ? Math.min(100, Math.round(totalOwned / totalVols * 100)) : null;
  const pctColor = pct >= 100 ? "#2D4A3E" : pct >= 50 ? "#3D3BAA" : "#BA7517";

  const coverItem = seriesItems.find(i => getCover(i.id));
  const cover = coverItem ? getCover(coverItem.id) : null;
  const initials = name.slice(0,2).toUpperCase();

  // Build set of owned volume numbers using volRange > title range > title single
  const ownedNums = new Set();
  seriesItems.forEach(i => {
    const src = i.volRange || "";
    if (src) {
      let found = false;
      src.split(/[\s,]+/).forEach(part => {
        const range = part.match(/^(\d+)[-–](\d+)$/);
        if (range) { const lo=parseInt(range[1]),hi=parseInt(range[2]); for(let v=lo;v<=Math.min(hi,lo+200);v++) ownedNums.add(v); found=true; }
        else if (/^\d+$/.test(part)) { ownedNums.add(parseInt(part)); found=true; }
      });
      if (found) return;
    }
    const t = i.title || "";
    const rangeMatch = t.match(/(?:vol(?:ume)?\.?\s*|#)(\d+)[-–](\d+)/i);
    if (rangeMatch) { const lo=parseInt(rangeMatch[1]),hi=parseInt(rangeMatch[2]); for(let v=lo;v<=Math.min(hi,lo+200);v++) ownedNums.add(v); return; }
    const single = t.match(/(?:vol(?:ume)?\.?\s*|#|no\.?\s*)(\d+)/i) || t.match(/\b(\d+)\s*$/);
    if (single) ownedNums.add(parseInt(single[1]));
  });

  // Volume bubble grid
  let bubbleHTML = "";
  if (ownedNums.size > 0 || totalVols) {
    const maxVol = totalVols || (ownedNums.size ? Math.max(...ownedNums) : 0);
    let bubbles = [];
    for (let v = 1; v <= maxVol; v++) {
      bubbles.push(`<div class="vol-bubble ${ownedNums.has(v) ? "owned" : "missing"}" title="Vol. ${v}">${v}</div>`);
    }
    [...ownedNums].filter(n => n > (totalVols||0)).sort((a,b)=>a-b).forEach(n => {
      bubbles.push(`<div class="vol-bubble owned" title="Vol. ${n}">${n}</div>`);
    });
    bubbleHTML = `<div class="section-label">Volume Map</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">
        <span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px"><span style="width:10px;height:10px;border-radius:3px;background:var(--accent-light);border:1px solid rgba(45,74,62,0.25);display:inline-block"></span>Owned</span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#FDDEDE;border:1px solid #F5C0C0;display:inline-block"></span>Missing</span>
      </div>
      <div class="vol-grid">${bubbles.join("")}</div>`;
  }

  // Owned volumes list
  const volListHTML = `<div class="section-label" style="margin-top:18px">Owned Volumes (${totalOwned})</div>
    ${seriesItems.map(i => {
      const c = getCover(i.id);
      const sc = STATUS_COLORS[i.status] || {bg:"#eee",fg:"#555"};
      const meta2 = [i.pricePaid != null ? `£${i.pricePaid.toFixed(2)}` : "", i.dateBought || ""].filter(Boolean).join(" · ");
      return `<div class="vol-item-row" onclick="closeSeriesDetail();openEdit(${i.id})">
        ${c ? `<img class="vol-item-cover" src="${c}" alt="">` : `<div class="vol-item-cover-placeholder" style="background:#2D4A3E">${esc(initials)}</div>`}
        <div class="vol-item-info">
          <div class="vol-item-title">${esc(i.title)}</div>
          ${meta2 ? `<div class="vol-item-meta">${meta2}</div>` : ""}
        </div>
        <span class="status-pill" style="background:${sc.bg};color:${sc.fg};font-size:10px">${i.status}</span>
      </div>`;
    }).join("")}`;

  document.getElementById("series-detail-cover-wrap").innerHTML = cover
    ? `<img class="series-detail-cover" src="${cover}" alt="${esc(name)}">`
    : `<div class="series-detail-cover-placeholder" style="background:#2D4A3E">${esc(initials)}</div>`;

  document.getElementById("series-detail-meta").innerHTML = `
    <div class="series-detail-name">${esc(name)}</div>
    ${sm.author ? `<div class="series-detail-author">${esc(sm.author)}</div>` : ""}
    <div class="meta-tags" style="margin-top:6px">
      ${sm.demographic ? `<span class="meta-tag">${esc(sm.demographic)}</span>` : ""}
      ${sm.genre ? `<span class="meta-tag">${esc(sm.genre)}</span>` : ""}
      ${sm.publisher ? `<span class="meta-tag" style="background:var(--accent-light);color:var(--accent);border-color:rgba(45,74,62,0.2)">${esc(sm.publisher)}</span>` : ""}
    </div>
    ${pct !== null ? `<div style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px"><span>Collection progress</span><span style="font-weight:600;color:${pctColor}">${pct}%</span></div>
      <div style="height:6px;background:var(--surface2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pctColor};border-radius:99px"></div></div>
    </div>` : ""}`;

  document.getElementById("series-detail-kpis").innerHTML = `
    <div class="series-kpi"><div class="series-kpi-label">Owned</div><div class="series-kpi-value">${totalOwned}</div>${totalVols ? `<div class="series-kpi-sub">of ${totalVols}</div>` : ""}</div>
    ${totalVols ? `<div class="series-kpi"><div class="series-kpi-label">Missing</div><div class="series-kpi-value" style="color:#A32D2D">${Math.max(0, totalVols - totalOwned)}</div></div>` : ""}
    <div class="series-kpi"><div class="series-kpi-label">Total Spent</div><div class="series-kpi-value" style="font-size:18px">£${totalSpent.toFixed(2)}</div></div>
    ${avgPrice != null ? `<div class="series-kpi"><div class="series-kpi-label">Avg / Vol</div><div class="series-kpi-value" style="font-size:18px">£${avgPrice.toFixed(2)}</div></div>` : ""}
    <div class="series-kpi"><div class="series-kpi-label">Manga Status</div><div class="series-kpi-value" style="font-size:13px;margin-top:4px">${esc(sm.mangaStatus||"—")}</div></div>
    <div class="series-kpi"><div class="series-kpi-label">Collection</div><div class="series-kpi-value" style="font-size:13px;margin-top:4px">${esc(sm.collectionStatus||"—")}</div></div>
    ${sm.rating ? (() => {
      const r = parseInt(sm.rating);
      const cls = r === 10 ? "rb-perfect" : r >= 8 ? "rb-high" : r >= 5 ? "rb-mid" : "rb-low";
      return `<div class="series-kpi"><div class="series-kpi-label">Rating</div><div style="margin-top:4px"><div class="rating-badge ${cls}"><span class="rb-star">★</span><span class="rb-num">${r}/10</span></div></div></div>`;
    })() : ""}`;

  document.getElementById("series-detail-body").innerHTML = bubbleHTML + volListHTML;
  document.getElementById("series-detail-edit-btn").onclick = () => { closeSeriesDetail(); editSeries(name); };
  document.getElementById("series-detail-modal").style.display = "flex";
}

function closeSeriesDetail() {
  document.getElementById("series-detail-modal").style.display = "none";
}

/* ---- AUTHOR MODAL ---- */
function openAuthorModal(authorName) {
  const meta = _seriesMeta;

  // Build series data for this author
  const seriesMap = {};
  items.filter(i => (i.author || "Unknown") === authorName).forEach(item => {
    const name = item.series || "Standalone";
    if (!seriesMap[name]) {
      seriesMap[name] = { name, owned: 0, coverItemId: getCover(item.id) ? item.id : null,
        total: "", demographic: "", genre: "", publisher: "", mangaStatus: "Publishing", collectionStatus: "Collecting" };
    } else if (!seriesMap[name].coverItemId && getCover(item.id)) {
      seriesMap[name].coverItemId = item.id;
    }
    seriesMap[name].owned++;
  });
  Object.values(seriesMap).forEach(s => {
    const sm = meta[s.name] || {};
    Object.assign(s, { total: sm.total || "", demographic: sm.demographic || "", genre: sm.genre || "",
      publisher: sm.publisher || "", mangaStatus: sm.mangaStatus || "Publishing", collectionStatus: sm.collectionStatus || "Collecting" });
    const total = parseInt(s.total);
    s.pct = (!isNaN(total) && total > 0) ? Math.min(100, Math.round((s.owned / total) * 100)) : null;
  });
  const seriesList = Object.values(seriesMap).sort((a,b) => b.owned - a.owned);

  document.getElementById("author-modal-name").textContent = authorName;
  document.getElementById("author-modal-grid").innerHTML = seriesList.map(series => {
    const pct = series.pct ?? 0;
    const pctColor = pct >= 100 ? "#2D4A3E" : pct >= 50 ? "#3D3BAA" : "#BA7517";
    const cover = series.coverItemId ? getCover(series.coverItemId) : null;
    return `<div class="card">
      ${cover ? `<img class="card-cover" src="${cover}" alt="${esc(series.name)}">` : `<div class="card-cover-placeholder" style="background:#2D4A3E">${esc(series.name.slice(0,2).toUpperCase())}</div>`}
      <div class="card-body">
        <div class="card-title">${esc(series.name)}</div>
        <div class="meta-tags" style="margin-top:5px">
          ${series.demographic ? `<span class="meta-tag">${esc(series.demographic)}</span>` : ""}
          ${series.genre ? `<span class="meta-tag">${esc(series.genre)}</span>` : ""}
          ${series.publisher ? `<span class="meta-tag" style="background:var(--accent-light);color:var(--accent);border-color:rgba(45,74,62,0.2)">${esc(series.publisher)}</span>` : ""}
        </div>
        <div class="series-card-stat"><span>Volumes owned</span><span>${series.owned}${series.total ? " / " + series.total : ""}</span></div>
        ${series.pct !== null ? `<div style="margin-top:6px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:11px;color:var(--text3)">Collection</span>
            <span style="font-size:12px;font-weight:500;color:${pctColor}">${pct}%</span>
          </div>
          <div style="height:5px;background:var(--surface2);border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:99px"></div>
          </div>
        </div>` : ""}
        <div class="series-card-stat"><span>Manga status</span><span>${esc(series.mangaStatus)}</span></div>
        <div class="series-card-stat"><span>Collection status</span><span>${esc(series.collectionStatus)}</span></div>
      </div>
      <div class="card-footer">
        <button class="btn-icon" onclick="closeAuthorModal();editSeries('${series.name.replace(/'/g,"\\'")}')">Edit Series</button>
      </div>
    </div>`;
  }).join("");

  document.getElementById("author-modal").style.display = "flex";
}

function closeAuthorModal() {
  document.getElementById("author-modal").style.display = "none";
}

/* ---- MISSING VOLUMES FILTER ---- */
function filterMissing() {
  const q = (document.getElementById("missing-search")?.value || "").toLowerCase().trim();
  const f = document.getElementById("missing-filter-select")?.value || "all";
  const rows = document.querySelectorAll("#missing-list .missing-series-row");
  rows.forEach(row => {
    const name = row.dataset.name || "";
    const author = row.dataset.author || "";
    const status = row.dataset.status || "";
    const matchText = !q || name.includes(q) || author.includes(q);
    const matchFilter = f === "all" || f === status;
    row.style.display = matchText && matchFilter ? "" : "none";
  });
}

/* ---- IMPORT / EXPORT ---- */

function toggleIEMenu(e) {
  e.stopPropagation();
  const dd = document.getElementById("ie-dropdown");
  dd.style.display = dd.style.display === "none" ? "block" : "none";
}
document.addEventListener("click", () => {
  const dd = document.getElementById("ie-dropdown");
  if (dd) dd.style.display = "none";
});

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

async function exportJSON() {
  document.getElementById("ie-dropdown").style.display = "none";
  const seriesMeta = JSON.parse(localStorage.getItem("series-meta") || "{}");
  const allCovers = await CoverDB.getAll();
  const itemsWithCovers = items.map(i => ({
    ...i,
    cover: allCovers[String(i.id)] || null
  }));
  const payload = { version: 1, exportedAt: new Date().toISOString(), items: itemsWithCovers, seriesMeta };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `my-collection-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`✅ Exported ${items.length} titles as JSON`);
}

function exportCSV() {
  document.getElementById("ie-dropdown").style.display = "none";
  const cols = ["id","title","author","type","status","volumes","series","demographic","genre","publisher","dateBought","pricePaid","msrp","notes","addedAt"];
  const escape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const rows = [cols.join(",")];
  items.forEach(item => rows.push(cols.map(c => escape(item[c] ?? "")).join(",")));
  const blob = new Blob([rows.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `my-collection-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`✅ Exported ${items.length} titles as CSV`);
}

function importJSON(e) {
  document.getElementById("ie-dropdown").style.display = "none";
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const incoming = Array.isArray(data) ? data : (data.items || []);
      if (!incoming.length) { showToast("⚠️ No items found in file"); return; }
      const existingIds = new Set(items.map(i => i.id));
      const existingKeys = new Set(items.map(i => `${i.title}||${i.author || ""}`));
      let added = 0;
      const newCovers = {};
      incoming.forEach(inItem => {
        if (!inItem.title) return;
        const key = `${inItem.title}||${inItem.author || ""}`;
        if (existingKeys.has(key)) return;
        if (existingIds.has(inItem.id)) inItem = { ...inItem, id: Date.now() + Math.random() };
        const cover = inItem.cover || null;
        delete inItem.cover;
        if (cover) newCovers[String(inItem.id)] = cover;
        items.push({ ...inItem, importedAt: Date.now() }); existingIds.add(inItem.id); existingKeys.add(key); added++;
      });
      if (data.seriesMeta) {
        // Merge: imported data fills in fields, but existing local values win per-field
        // so we deep-merge per series rather than shallow-merging the whole object
        Object.entries(data.seriesMeta).forEach(([name, importedMeta]) => {
          _seriesMeta[name] = { ...importedMeta, ...(_seriesMeta[name] || {}) };
        });
        localStorage.setItem("series-meta", JSON.stringify(_seriesMeta));
      }
      // Write new covers to IndexedDB and cache
      if (Object.keys(newCovers).length) {
        Object.assign(coverCache, newCovers);
        await CoverDB.setMany(newCovers);
      }
      save(); render(); markDirty();
      showToast(`✅ Imported ${added} title${added !== 1 ? "s" : ""}`);
    } catch { showToast("❌ Invalid JSON file"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function importCSV(e) {
  document.getElementById("ie-dropdown").style.display = "none";
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.trim().split("\n");
      const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
      const parseVal = s => s.replace(/^"|"$/g,"").replace(/""/g,'"');
      let added = 0;
      lines.slice(1).forEach(line => {
        if (!line.trim()) return;
        const cols = []; let cur = "", inQ = false;
        for (const ch of line) {
          if (ch === '"') inQ = !inQ;
          else if (ch === "," && !inQ) { cols.push(cur); cur = ""; }
          else cur += ch;
        }
        cols.push(cur);
        const obj = {};
        headers.forEach((h, i) => obj[h] = parseVal(cols[i] || ""));
        if (!obj.title) return;
        const dup = items.find(i => i.title === obj.title && i.author === (obj.author || ""));
        if (dup) return;
        items.push({
          id: Date.now() + Math.random(),
          title: obj.title, author: obj.author || "",
          type: "Manga", status: obj.status || "Plan to Read",
          volumes: obj.volumes || "",
          series: obj.series || "", demographic: obj.demographic || "",
          genre: obj.genre || "", publisher: obj.publisher || "",
          notes: obj.notes || "",
          dateBought: obj.dateBought || null,
          pricePaid: obj.pricePaid !== "" ? parseFloat(obj.pricePaid) : null,
          msrp: obj.msrp !== "" ? parseFloat(obj.msrp) : null,
          addedAt: obj.addedAt ? Number(obj.addedAt) : Date.now(), importedAt: Date.now(), cover: null
        });
        added++;
      });
      save(); render(); renderSeries();
      showToast(`✅ Imported ${added} title${added !== 1 ? "s" : ""} from CSV`);
    } catch { showToast("❌ Could not parse CSV file"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}
</script>
