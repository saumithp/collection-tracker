<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE7;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #9E9B96;
    --accent: #2D4A3E;
    --accent-light: #E1F5EE;
    --manga-bg: #EEF0FF;
    --manga-fg: #3D3BAA;
    --book-bg: #FFF4E6;
    --book-fg: #8B4A00;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- LAYOUT ---- */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo { font-family: 'Fraunces', serif; font-size: 20px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { font-style: italic; }

  main { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ---- STATS ---- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; color: var(--text); line-height: 1; }

  /* ---- TOOLBAR ---- */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 200px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  input[type=text], input[type=search] {
    width: 100%; padding: 9px 12px 9px 36px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=search]:focus { border-color: var(--accent); }
  select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--surface);
    color: var(--text2); outline: none; cursor: pointer;
  }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
    background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ---- ADD BUTTON ---- */
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 18px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; }

  /* ---- GRID ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border2); }

  .card-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--surface2); }
  .card-cover-placeholder {
    width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: rgba(255,255,255,0.85);
  }
  .card-body { padding: 11px 13px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .card-type { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .type-manga { background: var(--manga-bg); color: var(--manga-fg); }
  .type-book { background: var(--book-bg); color: var(--book-fg); }
  .card-title { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; line-height: 1.3;
    color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: 12px; color: var(--text3); }
  .card-stars { display: flex; gap: 2px; font-size: 12px; }
  .card-footer {
    border-top: 1px solid var(--border); padding: 8px 13px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .card-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 4px 7px;
    font-size: 12px; border-radius: 6px; color: var(--text3); font-family: 'DM Sans', sans-serif;
    transition: background 0.12s, color 0.12s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }
  .btn-icon.del:hover { background: #FFEAEA; color: #C0392B; }

  /* ---- EMPTY ---- */
  .empty { text-align: center; padding: 80px 20px; border: 2px dashed var(--border); border-radius: var(--radius-lg); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { color: var(--text2); font-size: 14px; }

  /* ---- MODAL ---- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 16px;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: 18px;
    width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-family: 'Fraunces', serif; font-size: 18px; }
  .btn-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3); padding: 4px; border-radius: 6px; }
  .btn-close:hover { color: var(--text); background: var(--surface2); }
  .modal-body { padding: 20px 24px 24px; }

  /* ---- FORM ---- */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface);
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 72px; }

  .cover-upload-area {
    display: flex; gap: 16px; align-items: center; margin-bottom: 20px;
    padding: 14px; background: var(--surface2); border-radius: var(--radius); border: 1px dashed var(--border2);
  }
  .cover-preview { width: 70px; height: 98px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface); }
  .cover-placeholder-sm {
    width: 70px; height: 98px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; background: var(--surface); border: 1px solid var(--border);
  }
  .btn-upload {
    display: inline-block; padding: 7px 14px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; background: var(--surface); color: var(--text2);
    transition: all 0.12s;
  }
  .btn-upload:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove-cover { background: none; border: none; font-size: 12px; color: #C0392B; cursor: pointer; margin-left: 8px; font-family: 'DM Sans', sans-serif; }

  .stars-input { display: flex; gap: 4px; }
  .star-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 2px; transition: transform 0.1s; }
  .star-btn:hover { transform: scale(1.2); }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }
  .btn-cancel {
    padding: 9px 18px; border: 1px solid var(--border2); border-radius: var(--radius);
    background: none; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: var(--text2);
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 9px 22px; background: var(--accent); color: white; border: none;
    border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.88; }

  
  .meta-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .meta-tag {
    font-size:10px;
    padding:3px 7px;
    border-radius:20px;
    background: var(--surface2);
    color: var(--text2);
    border:1px solid var(--border);
  }
  .series-card-stat {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--text2);
    margin-top:6px;
  }


  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    header { padding: 0 1rem; }
    main { padding: 1.25rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">My <span>Collection</span></div>
  <button class="btn-add" onclick="openAdd()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Add title
  </button>
</header>

<main>
  <div class="view-tabs" style="display:flex;gap:10px;margin-bottom:1.5rem;">
    <button class="filter-btn active" id="library-tab" onclick="switchView('library')">Library</button>
    <button class="filter-btn" id="series-tab" onclick="switchView('series')">Series</button>
  </div>

  <div id="library-view">
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Manga</div><div class="stat-value" id="s-manga">0</div></div>
    <div class="stat-card"><div class="stat-label">Books</div><div class="stat-value" id="s-books">0</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="s-done">0</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
      <input type="search" id="search" placeholder="Search titles, authors…" oninput="render()">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-type="All" onclick="setType(this)">All</button>
      <button class="filter-btn" data-type="Manga" onclick="setType(this)">Manga</button>
      <button class="filter-btn" data-type="Books" onclick="setType(this)">Books</button>
    </div>
    <select id="status-filter" onchange="render()">
      <option value="All">All statuses</option>
      <option>Reading</option>
      <option>Completed</option>
      <option>On Hold</option>
      <option>Plan to Read</option>
      <option>Dropped</option>
    </select>
    <select id="sort-select" onchange="render()">
      <option value="added">Newest first</option>
      <option value="title">A–Z</option>
      <option value="rating">Top rated</option>
    </select>
  </div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>
  </div>

  <div id="series-view" style="display:none">
    <div class="grid" id="series-grid"></div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add to collection</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <!-- Cover upload -->
      <div class="cover-upload-area">
        <div id="cover-preview-wrap">
          <div class="cover-placeholder-sm" id="cover-placeholder">📖</div>
          <img class="cover-preview" id="cover-preview" src="" alt="" style="display:none">
        </div>
        <div>
          <label class="btn-upload" for="cover-input">Upload cover</label>
          <input type="file" id="cover-input" accept="image/*" style="display:none" onchange="handleCover(event)">
          <button class="btn-remove-cover" id="remove-cover-btn" style="display:none" onclick="removeCover()">Remove</button>
          <p style="font-size:11px;color:var(--text3);margin-top:6px">JPG, PNG, WEBP</p>
        </div>
      </div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="e.g. Berserk">
      </div>
      <div class="form-group">
        <label>Author / Creator</label>
        <input type="text" id="f-author" placeholder="e.g. Kentaro Miura">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select id="f-type" onchange="updateVolLabel()">
            <option value="Manga">Manga</option>
            <option value="Books">Books</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option>Reading</option>
            <option>Completed</option>
            <option>On Hold</option>
            <option selected>Plan to Read</option>
            <option>Dropped</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating</label>
          <div class="stars-input" id="star-input">
            <button class="star-btn" data-v="1" onclick="setStar(1)">☆</button>
            <button class="star-btn" data-v="2" onclick="setStar(2)">☆</button>
            <button class="star-btn" data-v="3" onclick="setStar(3)">☆</button>
            <button class="star-btn" data-v="4" onclick="setStar(4)">☆</button>
            <button class="star-btn" data-v="5" onclick="setStar(5)">☆</button>
          </div>
          <input type="hidden" id="f-rating" value="0">
        </div>
        <div class="form-group">
          <label id="vol-label">Volumes</label>
          <input type="text" id="f-volumes" placeholder="e.g. 12">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Series</label>
          <input type="text" id="f-series" placeholder="e.g. One Piece">
        </div>
        <div class="form-group">
          <label>Demographic</label>
          <input type="text" id="f-demographic" placeholder="e.g. Shounen">
        </div>
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="f-genre" placeholder="e.g. Action">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Any thoughts…"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveItem()">Add to collection</button>
      </div>
    </div>
  </div>
</div>

<script>

PRELOADED.forEach(i => {
  i.demographic = "Shounen";
  i.genre = "Action";
  i.series = "One Piece";
});

let items = JSON.parse(localStorage.getItem("collection-v1") || "null");
if (!items) { items = PRELOADED; localStorage.setItem("collection-v1", JSON.stringify(items)); }
let typeFilter = "All";
let currentCover = null;
let currentRating = 0;
let currentView = 'library';

function save() { localStorage.setItem("collection-v1", JSON.stringify(items)); }


function switchView(view) {
  currentView = view;
  document.getElementById("library-view").style.display = view === "library" ? "block" : "none";
  document.getElementById("series-view").style.display = view === "series" ? "block" : "none";
  document.getElementById("library-tab").classList.toggle("active", view === "library");
  document.getElementById("series-tab").classList.toggle("active", view === "series");
  if (view === "series") renderSeries();
}

function renderSeries() {
  const grid = document.getElementById("series-grid");

  const seriesMap = {};
  items.forEach(item => {
    const name = item.series || "Standalone";
    if (!seriesMap[name]) {
      seriesMap[name] = {
        name,
        type: item.type,
        demographic: item.demographic || "",
        genre: item.genre || "",
        cover: item.cover,
        owned: 0,
        total: "",
        mangaStatus: "Publishing",
        collectionStatus: "Collecting"
      };
    }
    seriesMap[name].owned++;
  });

  const savedSeries = JSON.parse(localStorage.getItem("series-meta") || "{}");

  Object.values(seriesMap).forEach(series => {
    if (savedSeries[series.name]) {
      Object.assign(series, savedSeries[series.name]);
    }
  });

  grid.innerHTML = Object.values(seriesMap).map(series => `
    <div class="card">
      ${series.cover ? `<img class="card-cover" src="${series.cover}" alt="${esc(series.name)}">`
      : `<div class="card-cover-placeholder" style="background:#2D4A3E">${esc(series.name.slice(0,2).toUpperCase())}</div>`}
      <div class="card-body">
        <div class="card-title">${esc(series.name)}</div>
        <div class="meta-tags">
          ${series.demographic ? `<span class="meta-tag">${esc(series.demographic)}</span>` : ""}
          ${series.genre ? `<span class="meta-tag">${esc(series.genre)}</span>` : ""}
        </div>
        <div class="series-card-stat"><span>Total volumes</span><span>${esc(series.total || "-")}</span></div>
        <div class="series-card-stat"><span>Volumes owned</span><span>${series.owned}</span></div>
        <div class="series-card-stat"><span>Manga status</span><span>${esc(series.mangaStatus)}</span></div>
        <div class="series-card-stat"><span>Collection status</span><span>${esc(series.collectionStatus)}</span></div>
      </div>
      <div class="card-footer">
        <button class="btn-icon" onclick="editSeries('${series.name.replace(/'/g,"\\'")}')">Edit Series</button>
      </div>
    </div>
  `).join("");
}

function editSeries(name) {
  const meta = JSON.parse(localStorage.getItem("series-meta") || "{}");
  const current = meta[name] || {};

  const total = prompt(`Total volumes for ${name}`, current.total || "");
  if (total === null) return;

  const mangaStatus = prompt(`Manga status for ${name}`, current.mangaStatus || "Publishing");
  if (mangaStatus === null) return;

  const collectionStatus = prompt(`Collection status for ${name}`, current.collectionStatus || "Collecting");
  if (collectionStatus === null) return;

  meta[name] = {
    ...(meta[name] || {}),
    total,
    mangaStatus,
    collectionStatus
  };

  localStorage.setItem("series-meta", JSON.stringify(meta));
  renderSeries();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("status-filter").value;
  const sort = document.getElementById("sort-select").value;

  let list = items
    .filter(i => typeFilter === "All" || i.type === typeFilter)
    .filter(i => status === "All" || i.status === status)
    .filter(i => !search || i.title.toLowerCase().includes(search) || (i.author||"").toLowerCase().includes(search));

  if (sort === "title") list.sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric: true, sensitivity: 'base'}));
  else if (sort === "rating") list.sort((a,b) => b.rating - a.rating);
  else list.sort((a,b) => b.addedAt - a.addedAt);

  document.getElementById("s-total").textContent = items.length;
  document.getElementById("s-manga").textContent = items.filter(i=>i.type==="Manga").length;
  document.getElementById("s-books").textContent = items.filter(i=>i.type==="Books").length;
  document.getElementById("s-done").textContent = items.filter(i=>i.status==="Completed").length;

  const grid = document.getElementById("grid");
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">📚</div>
      <p>${items.length===0 ? "Add your first title to get started" : "No titles match your filters"}</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(item => {
    const sc = STATUS_COLORS[item.status] || { bg:"#eee", fg:"#555" };
    const initials = item.title.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
    const color = PALETTE[item.title.length % PALETTE.length];
    const stars = [1,2,3,4,5].map(s => `<span style="color:${s<=item.rating?"#EF9F27":"#DDD"};font-size:12px">★</span>`).join("");
    const coverHtml = item.cover
      ? `<img class="card-cover" src="${item.cover}" alt="${esc(item.title)}">`
      : `<div class="card-cover-placeholder" style="background:${color}">${initials}</div>`;
    return `<div class="card">
      ${coverHtml}
      <div class="card-body">
        <span class="card-type ${item.type==="Manga"?"type-manga":"type-book"}">${item.type}</span>
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-author">${esc(item.author||"Unknown author")}</div>
        <div class="card-stars">${stars}</div>
        <div class="meta-tags">
          ${item.series ? `<span class="meta-tag">${esc(item.series)}</span>` : ""}
          ${item.demographic ? `<span class="meta-tag">${esc(item.demographic)}</span>` : ""}
          ${item.genre ? `<span class="meta-tag">${esc(item.genre)}</span>` : ""}
        </div>
        ${item.volumes ? `<div style="font-size:11px;color:var(--text3)">${esc(item.volumes)} ${item.type==="Manga"?"vol.":"pg."}</div>` : ""}
      </div>
      <div class="card-footer">
        <span class="status-pill" style="background:${sc.bg};color:${sc.fg}">${item.status}</span>
        <div class="card-actions">
          <button class="btn-icon" onclick="openEdit(${item.id})">Edit</button>
          <button class="btn-icon del" onclick="deleteItem(${item.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function setType(btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  typeFilter = btn.dataset.type;
  render();
}

function setStar(n) {
  currentRating = currentRating === n ? 0 : n;
  document.getElementById("f-rating").value = currentRating;
  document.querySelectorAll(".star-btn").forEach((btn, i) => {
    btn.textContent = i < currentRating ? "★" : "☆";
    btn.style.color = i < currentRating ? "#EF9F27" : "#CCC";
  });
}

function updateVolLabel() {
  document.getElementById("vol-label").textContent = document.getElementById("f-type").value === "Manga" ? "Volumes" : "Pages";
}

function handleCover(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentCover = ev.target.result;
    const img = document.getElementById("cover-preview");
    img.src = currentCover; img.style.display = "block";
    document.getElementById("cover-placeholder").style.display = "none";
    document.getElementById("remove-cover-btn").style.display = "inline";
  };
  reader.readAsDataURL(file);
}

function removeCover() {
  currentCover = null;
  document.getElementById("cover-preview").style.display = "none";
  document.getElementById("cover-placeholder").style.display = "flex";
  document.getElementById("remove-cover-btn").style.display = "none";
  document.getElementById("cover-input").value = "";
}

function openAdd() {
  document.getElementById("edit-id").value = "";
  document.getElementById("modal-title").textContent = "Add to collection";
  document.querySelector(".btn-save").textContent = "Add to collection";
  document.getElementById("f-title").value = "";
  document.getElementById("f-author").value = "";
  document.getElementById("f-type").value = "Manga";
  document.getElementById("f-status").value = "Plan to Read";
  document.getElementById("f-volumes").value = "";
  document.getElementById("f-notes").value = "";
  document.getElementById("f-series").value = "";
  document.getElementById("f-demographic").value = "";
  document.getElementById("f-genre").value = "";
  removeCover(); setStar(0); updateVolLabel();
  document.getElementById("modal").style.display = "flex";
}

function openEdit(id) {
  const item = items.find(i => i.id === id); if (!item) return;
  document.getElementById("edit-id").value = id;
  document.getElementById("modal-title").textContent = "Edit title";
  document.querySelector(".btn-save").textContent = "Save changes";
  document.getElementById("f-title").value = item.title;
  document.getElementById("f-author").value = item.author || "";
  document.getElementById("f-type").value = item.type;
  document.getElementById("f-status").value = item.status;
  document.getElementById("f-volumes").value = item.volumes || "";
  document.getElementById("f-notes").value = item.notes || "";
  document.getElementById("f-series").value = item.series || "";
  document.getElementById("f-demographic").value = item.demographic || "";
  document.getElementById("f-genre").value = item.genre || "";
  currentCover = item.cover || null;
  if (currentCover) {
    const img = document.getElementById("cover-preview");
    img.src = currentCover; img.style.display = "block";
    document.getElementById("cover-placeholder").style.display = "none";
    document.getElementById("remove-cover-btn").style.display = "inline";
  } else { removeCover(); }
  currentRating = item.rating || 0;
  document.getElementById("f-rating").value = currentRating;
  document.querySelectorAll(".star-btn").forEach((btn, i) => {
    btn.textContent = i < currentRating ? "★" : "☆";
    btn.style.color = i < currentRating ? "#EF9F27" : "#CCC";
  });
  updateVolLabel();
  document.getElementById("modal").style.display = "flex";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }
function overlayClick(e) { if (e.target === document.getElementById("modal")) closeModal(); }

function saveItem() {
  const title = document.getElementById("f-title").value.trim();
  if (!title) { document.getElementById("f-title").focus(); return; }
  const editId = parseInt(document.getElementById("edit-id").value);
  const obj = {
    title, author: document.getElementById("f-author").value.trim(),
    type: document.getElementById("f-type").value,
    status: document.getElementById("f-status").value,
    volumes: document.getElementById("f-volumes").value.trim(),
    series: document.getElementById("f-series").value.trim(),
    demographic: document.getElementById("f-demographic").value.trim(),
    genre: document.getElementById("f-genre").value.trim(),
    notes: document.getElementById("f-notes").value.trim(),
    cover: currentCover,
    rating: parseInt(document.getElementById("f-rating").value) || 0,
  };
  if (editId) {
    const idx = items.findIndex(i => i.id === editId);
    if (idx > -1) items[idx] = { ...items[idx], ...obj };
  } else {
    items.unshift({ ...obj, id: Date.now(), addedAt: Date.now() });
  }
  save(); render(); renderSeries(); renderSeries(); closeModal();
}

function deleteItem(id) {
  if (!confirm("Remove this title from your collection?")) return;
  items = items.filter(i => i.id !== id);
  save(); render();
}

render();
</script>
</body>
</html>
